<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {font-family: Arial; text-align:center; margin:0; padding:0;}
    .grid {display:grid; grid-template-columns: 1fr 1fr 1fr; grid-template-rows: auto auto auto; gap:10px;}
    .btn {width:100%; height:80px; font-size:20px; border:none; border-radius:10px;
          user-select:none; touch-action:none;}
    .forward {background:#4CAF50; color:white; grid-column:2; grid-row:1;}
    .backward {background:#f44336; color:white; grid-column:2; grid-row:3;}
    .left {background:#2196F3; color:white; grid-column:1; grid-row:2;}
    .right {background:#FF9800; color:white; grid-column:3; grid-row:2;}
    .stop {background:#555; color:white; grid-column:2; grid-row:2;}
    #speedBar {width:90%; height:20px; background:#ddd; margin:10px auto; border-radius:10px; overflow:hidden;}
    #barFill {height:100%; width:0%; background:#4CAF50;}
  </style>
</head>
<body>
  <h2>WiFi Controlled Car</h2>
  <h3 id="status">Status: Stopped</h3>
  <div class="grid">
    <button class="btn forward" id="btnF">Forward</button>
    <button class="btn left" id="btnL">Left</button>
    <button class="btn stop" id="btnS">Stop</button>
    <button class="btn right" id="btnR">Right</button>
    <button class="btn backward" id="btnB">Backward</button>
  </div>

  <div>
    Speed:<br>
    <input type="range" min="160" max="242" value="200" id="speedSlider">
    <span id="val">200</span>
    <div id="speedBar"><div id="barFill"></div></div>
  </div>

  <script>
    const esp32IP = "http://192.168.1.95"; // replace with your ESP32 IP

    function sendCmd(cmd) {
      fetch(esp32IP + cmd)
        .then(res => res.json())
        .then(data => {
          document.getElementById("status").innerText = "Status: " + data.status;
          updateBar(data.status.includes("Speed") ? parseInt(data.status.split(" ")[1]) : document.getElementById("speedSlider").value);
        })
        .catch(err => console.error(err));
    }

    function updateBar(val){
      var percent=(val-160)*100/82;
      document.getElementById('barFill').style.width=percent+'%';
    }

    function bindButton(id, cmd, label){
      var btn=document.getElementById(id);
      btn.addEventListener('mousedown',function(e){e.preventDefault();sendCmd(cmd);});
      btn.addEventListener('mouseup',function(e){e.preventDefault();sendCmd('/S');});
      btn.addEventListener('mouseleave',function(e){sendCmd('/S');});
    }

    bindButton('btnF','/F','Forward');
    bindButton('btnB','/B','Backward');
    bindButton('btnL','/L','Left');
    bindButton('btnR','/R','Right');
    document.getElementById('btnS').addEventListener('click',function(e){e.preventDefault();sendCmd('/S');});

    let sliderTimer=null; 
    var slider=document.getElementById('speedSlider');
    slider.addEventListener('input',function(){
      clearTimeout(sliderTimer);
      var val=this.value;
      document.getElementById('val').innerText=val;
      updateBar(val);
      sliderTimer=setTimeout(()=>{sendCmd('/speed='+val);},150);
    });
  </script>
</body>
</html>
