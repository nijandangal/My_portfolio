<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESP32 Car Control</title>
  <style>
    body {font-family: Arial; text-align:center; margin:0; padding:0;}
    .grid {display:grid; grid-template-columns: 1fr 1fr 1fr; grid-template-rows: auto auto auto; gap:10px;}
    .btn {
      width:100%; height:80px; font-size:20px; border:none; border-radius:10px;
      user-select:none; touch-action:none; transition: transform 0.1s ease, opacity 0.1s ease;
    }
    .btn:active {transform: scale(0.95); opacity:0.8;} /* visual press effect */
    .forward {background:#4CAF50; color:white; grid-column:2; grid-row:1;}
    .backward {background:#f44336; color:white; grid-column:2; grid-row:3;}
    .left {background:#2196F3; color:white; grid-column:1; grid-row:2;}
    .right {background:#FF9800; color:white; grid-column:3; grid-row:2;}
    .stop {background:#555; color:white; grid-column:2; grid-row:2;}
    #speedBar {width:90%; height:20px; background:#ddd; margin:10px auto; border-radius:10px; overflow:hidden;}
    #barFill {height:100%; background:#4CAF50;}
  </style>
</head>
<body>
  <h2>WiFi Controlled Car</h2>
  <h3>ESP32 WebClient (Global)</h3>
  <h3 id="status">Status: Stopped</h3>

  <div class="grid">
    <button class="btn forward" id="btnF">Forward</button>
    <button class="btn left" id="btnL">Left</button>
    <button class="btn stop" id="btnS">Stop</button>
    <button class="btn right" id="btnR">Right</button>
    <button class="btn backward" id="btnB">Backward</button>
  </div>

  <div>
    Speed:<br>
    <input type="range" min="160" max="242" step="1" value="200" id="speedSlider">
    <span id="val">200</span>
    <div id="speedBar"><div id="barFill" style="width:50%"></div></div>
  </div>

  <script>
    // WebSocket connection
    var ws = new WebSocket("wss://esp32-car-relay.nijandangal.workers.dev");

    ws.onopen = () => console.log("WebSocket connected");
    ws.onmessage = (event) => {
      document.getElementById('status').innerText = event.data;
    };

    function sendCmd(cmd){
      if(ws.readyState === WebSocket.OPEN){
        ws.send(cmd);
        console.log("Sent:", cmd);
      }
    }

    function bindButton(id, cmd){
      var btn=document.getElementById(id);
      // Mouse events
      btn.addEventListener('mousedown',()=>{sendCmd(cmd);});
      btn.addEventListener('mouseup',()=>{sendCmd('stop');});
      btn.addEventListener('mouseleave',()=>{sendCmd('stop');});
      // Touch events
      btn.addEventListener('touchstart',(e)=>{e.preventDefault();sendCmd(cmd);});
      btn.addEventListener('touchend',(e)=>{e.preventDefault();sendCmd('stop');});
      btn.addEventListener('touchcancel',(e)=>{e.preventDefault();sendCmd('stop');});
    }

    bindButton('btnF','forward');
    bindButton('btnB','backward');
    bindButton('btnL','left');
    bindButton('btnR','right');
    document.getElementById('btnS').addEventListener('click',()=>sendCmd('stop'));

    var slider=document.getElementById('speedSlider');
    slider.addEventListener('input',function(){
      var val=parseInt(this.value);
      document.getElementById('val').innerText=val;
      document.getElementById('barFill').style.width = ((val-160)/(242-160)*100) + "%";
      sendCmd('speed'+val);
    });
  </script>
</body>
</html>
